<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RJYF - राइजिंग जाट यूथ फाउंडेशन</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-green: #11532e;
            --brand-dark-green: #0b3a20;
            --brand-gold: #d4af37;
            --light-bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background-color: var(--light-bg); 
            color: var(--text-main); 
            -webkit-font-smoothing: antialiased; 
            padding-bottom: 20px;
        }

        /* 🗂️ 3-in-1 असली टैब नेविगेशन बार */
        .tabs-container {
            max-width: 100%;
            width: 1140px;
            margin: 15px auto;
            padding: 0 15px;
        }
        .tabs-nav {
            display: flex;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            border: 1px solid #e2e8f0;
        }
        .tab-btn {
            flex: 1;
            padding: 14px 10px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .tab-btn:not(:last-child) {
            border-right: 1px solid #e2e8f0;
        }
        .tab-btn:hover {
            background-color: #f8fafc;
            color: var(--brand-green);
        }
        .tab-btn.active {
            color: var(--brand-green);
            background-color: #f0fdf4;
            border-bottom: 3px solid var(--brand-gold);
        }

        /* 🚀 कंटेंट एरिया */
        .content-container {
            max-width: 100%;
            width: 1140px;
            margin: 0 auto;
            padding: 0 15px;
        }
        
        .tab-panel {
            display: none;
            width: 100%;
        }
        .tab-panel.active {
            display: block;
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 🏛️ कार्ड्स और लेआउट */
        .rjyf-card, .yellow-box {
            background: #ffffff;
            border-radius: 16px;
            padding: 22px 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
            width: 100%;
            max-width: 100%;
        }
        .yellow-box {
            background-color: #fcd34d;
            color: #0f172a;
        }
        .panel-title {
            font-size: 19px;
            color: var(--brand-green);
            font-weight: 700;
            margin-bottom: 15px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 5px;
        }
        .yellow-box .panel-title {
            color: #0f172a;
            border-bottom-color: rgba(0,0,0,0.1);
        }
        .panel-text {
            font-size: 14.5px;
            line-height: 1.6;
            margin-bottom: 15px;
            text-align: justify;
        }
        .content-list {
            list-style: none;
            padding-left: 0;
        }
        .content-list li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.5;
        }
        .content-list li::before {
            content: "■";
            position: absolute;
            left: 0;
            top: 0;
            color: var(--brand-green);
            font-size: 12px;
        }
        .yellow-box .content-list li::before {
            color: #0f172a;
        }

        /* 📝 पंजीकरण फॉर्म और लिस्ट बॉक्स */
        .form-strip {
            background: linear-gradient(135deg, #11532e, #1a7442);
            padding: 35px 20px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 4px 12px rgba(17,83,46,0.12);
            margin-bottom: 20px;
            width: 100%;
            max-width: 100%;
        }
        .live-list-strip {
            background: linear-gradient(135deg, #0b3a20, #11532e);
            padding: 45px 20px !important;
        }
        .form-desc {
            color: #ffffff;
            font-size: 15.5px;
            margin-bottom: 20px;
            font-weight: 500;
            line-height: 1.5;
        }

        /* 🔥 जादुई गोल्डन फायर रोटेटिंग बॉर्डर कंटेनर */
        .fire-border-box {
            position: relative;
            display: inline-block;
            padding: 3px;
            border-radius: 35px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
            z-index: 1;
        }
